function Sin_Assist_v2() {
    if (v2_Assist) {
        if (!get_ival(ADS) || get_ival(Fire)) {
          v2Speed = (v2Speed + v2Angle + mod_edit[Sin_Strength] * Direction) % 360;
            if (abs(get_val(RX)) <= mod_edit[Sin_Radius] && abs(get_val(RY)) <= mod_edit[Sin_Radius]) {
                if (get_val(Fire)) {
                    v2Angle = mod_edit[Sin_Strength] * Direction;
                } else {
                    v2Angle = mod_edit[Sin_Strength] * Direction;
                }
                set_polar(PRS, v2Speed, (mod_edit[Sin_Radius] * 328) + get_polar(PRS, 0));
            }
        }
    } else {
        if (abs(get_val(RX)) < mod_edit[Sin_Radius] && abs(get_val(RY)) < mod_edit[Sin_Radius]) {
            set_val(PRS, 0);
// discord.gg/orla
        } else {
            if (get_val(RX) >= mod_edit[Sin_Radius]) {
                set_val(PRS, 45);
            } else if (get_val(RX) <= -mod_edit[Sin_Radius]) {
                set_val(PRS, 90);
