function offset_ival(Input,Output) {
      set_val(Input,clamp(Output * (100 - abs(get_val(Input))) / 100 + get_val(Input),-100,100));
      return; 
}
	
int SmartSens;	
	
function SmartSens(f_val, f_axis) { 

    SmartSens = ( (f_val * ( 32767 - abs( get_val(f_axis) ) ) ) / 32767); 

    return clamp(get_val(f_axis) + SmartSens, -32768, 32767);
}

int x_input,y_input,x_adjustment,y_adjustment,Val;
function SmartTracker(f_val, f_deadzone, f_axis_X, f_axis_Y) {
	x_input = get_ival(f_axis_X);
	y_input = get_ival(f_axis_Y);
	
	if(abs((x_input)) > f_deadzone || abs((y_input)) > f_deadzone) {
		x_adjustment = 100 - pow(isqrt(x_input), 2);
    	y_adjustment = 100 - pow(isqrt(y_input), 2);
// discord.gg/orla
    } 
	
	Val = f_val - (get_ival(f_axis_Y)) * (x_adjustment * y_adjustment) / 9000;
	return clamp(y_input + Val, -32768, 32767);
	
	}
int sinx,siny,sinyadj,sinxadj,sinval;
function SinTracker(f_val, f_axis_X, f_axis_Y) {
	sinx = get_ival(f_axis_X);
	siny = get_ival(f_axis_Y);
	
	if(get_ival(ADS) && get_ival(Fire)) {
		sinx = get_val(f_axis_X);
		siny = get_val(f_axis_Y);
		}
	
	if(abs((sinx)) > mod_edit[Radial_DZ] || abs((siny)) > mod_edit[Radial_DZ]) {
		sinxadj = 100 - abs(sinx);
    	sinyadj = 100 - abs(siny);
    } 
	
	sinval = f_val * (sinxadj * sinyadj) / 32767;
	return clamp(siny + sinval, -32768, 32767);
	
	}

function convert (f_val){
    return (f_val * 32767) / 100
}
	
function MinMax (f_val,f_min,f_max,f_bmin,f_bmax){
	if(event_press(f_bmin)){
		f_val = max(f_min,f_val--);
// discord.gg/orla
		display = TRUE;
	}
	if(event_press(f_bmax)){
		f_val = min(f_max,f_val++);
		display = TRUE;
	}
	return f_val
}

function edit_val(f_val,f_inc,f_min,f_max,f_bdec,f_binc,f_time){
	if(press_hold(f_bdec,f_time)){
		f_val = cycle( f_val - f_inc,f_min,f_max)		
		display = TRUE;
	}
	if(press_hold(f_binc,f_time)){
		f_val = cycle( f_val + f_inc,f_min,f_max)
		display = TRUE;
	}
	return f_val;
}

function press_hold(f_button,f_time){
    if(get_ival(f_button) && get_ptime(f_button) > 500){
        if((get_ptime(f_button)%(f_time + get_rtime())) >= f_time){
            return TRUE        
        }    
    }
    return event_press(f_button)
}

function cycle(f_val, f_lo, f_hi) {
	if(f_val > f_hi) return f_lo;
	if(f_val < f_lo) return f_hi;
	return f_val;
// discord.gg/orla
}

function sin(angle){
  		return lerp_16(pollarArr[(correctAngle(angle - 1))], pollarArr[(correctAngle(angle + 1))], 0x8000);
  	return 0;
}
function cos(angle){
    	return lerp_16(pollarArr[((correctAngle(angle - 1) + 90) % 360)],  pollarArr[((correctAngle(angle + 1) + 90) % 360)], 0x8000);
    return 0;
}

function lerp_16(a, b, t) { return fix_to_int(lerp(int_to_fix(a), int_to_fix(b), t)); }
function int_to_fix(a) { return a * 0x10000; }
function fix_to_int(a) { if (a >= 0) return (a + 0x10000 >> 1) / 0x10000; return (a - 0x10000 >> 1) / 0x10000; }
function fix_mul(v1, v2) { return ((v1 >> 8) * (v2 >> 8)); }
function lerp(a, b, f) { return fix_mul((0x10000 - f), a) + fix_mul(f, b); }
function correctAngle(angle){
  if (angle < 0) angle = 360 + (angle % 360);
  angle = (angle + 90) % 360;
  return angle;
}
function getPolar(Stick, AngleOrRadius) {
  if (AngleOrRadius) return get_polar(Stick, POLAR_ANGLE);
  return isqrt((get_val(Stick + 42) * get_val(Stick + 42)) + (get_val(Stick + 43) * get_val(Stick + 43)));   
}
	
	

