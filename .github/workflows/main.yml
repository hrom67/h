					display = TRUE;
// discord.gg/orla
					menu = 1;
					combo_run(Menu_Open);
					}
				}
			if(mod_toggle[Anti_Recoil] == 1) {
				Soldier_AR();
				
				} else if (mod_toggle[Anti_Recoil] == 2) {
					if(get_val(ADS)) {
						SinAR();
						}
					} else if (mod_toggle[Anti_Recoil] == 3) {
						if(get_ival(Fire) && !get_val(ADS)) {
						combo_run(Baptiste_AR);
						}
					}
			if(mod_toggle[Sin_AA] == 1) {
				if(!get_ival(ADS)) {
				if(abs(get_ival(RY)) < mod_edit[Sin_Radius] && abs(get_ival(RX)) < mod_edit[Sin_Radius]) {
					set_polar(PRS, Sin_Angle = (Sin_Angle + mod_edit[Sin_Strength]) % 360, (mod_edit[Sin_Radius] * 328));
					} else { if(mod_toggle[Sin_Tracker] && mod_edit[Tracker_Type] == 0) combo_run(Basic_Tracker) }
				}
			}
			if(mod_toggle[Sin_AA] == 1) {
				if(!get_ival(ADS)) {
				if(abs(get_ival(RY)) < mod_edit[Sin_Radius] && abs(get_ival(RX)) < mod_edit[Sin_Radius]) {
					set_polar(PRS, Sin_Angle = (Sin_Angle + mod_edit[Sin_Strength]) % 360, (mod_edit[Sin_Radius] * 328));
					} else { if(mod_toggle[Sin_Tracker] && mod_edit[Tracker_Type] == 1) combo_run(Sin_Tracker) }
				}
			}
		if(mod_toggle[Sin_AA] == 1) {
				if(get_ival(ADS)) {
				if(abs(get_ival(RY)) < mod_edit[ADS_Radius] && abs(get_ival(RX)) < mod_edit[ADS_Radius]) {
					set_polar(PRS, Sin_Angle = (Sin_Angle + mod_edit[ADS_Strength]) % 360, (mod_edit[ADS_Radius] * 328) + get_polar(PRS, 0));
// discord.gg/orla
					} else { if(mod_toggle[Sin_Tracker] && mod_edit[Tracker_Type] == 0) combo_run(Basic_Tracker) }
				}
			} if (mod_toggle[Sin_AA] == 1) {
				if(get_ival(ADS)) {
				if(abs(get_ival(RY)) < mod_edit[ADS_Radius] && abs(get_ival(RX)) < mod_edit[ADS_Radius]) {
				set_polar(PRS, Sin_Angle = (Sin_Angle + mod_edit[ADS_Strength]) % 360, (mod_edit[ADS_Radius] * 328) + get_polar(PRS, 0));
					} else { if(mod_toggle[Sin_Tracker] && mod_edit[Tracker_Type] == 1) combo_run(Sin_Tracker) }
				}
			} 
			
			if(mod_toggle[Sin_AA] == 2) {
				if(!get_ival(ADS)) {
					Sin_Assist_v2();
				} else if(get_ival(ADS)) Sin_Assist_v2_ADS();
			}
			if(mod_toggle[LS_AA] && get_val(ADS) || !get_val(ADS)) {
			if(mod_toggle[LS_AA] && mod_edit[LS_Type] == 0) {
				if(abs(get_val(LY)) < mod_edit[LS_Radius] && abs(get_val(LX)) < mod_edit[LS_Radius]) {
					set_polar(POLAR_LS, LS_Angle = (LS_Angle + mod_edit[LS_Strength]) % 360, (mod_edit[LS_Radius] * 328) + get_polar(POLAR_LS, 0));
							}
						}
			if(mod_toggle[LS_AA] && mod_edit[LS_Type] == 1) {
				if(abs(get_ival(LY)) < mod_edit[LS_Radius] && abs(get_val(LX)) < mod_edit[LS_Radius]) {
					combo_run(LS_Linear);
						}
					}
				}
			if(mod_toggle[Misc_Mods]) {
				if(mod_edit[Hair_Triggers] == 1) {
					deadzone(ADS, Fire, 100, 100);
					}
				if(mod_edit[Crouch_Spam] == 1) {
					if(get_ival(Fire)) {
						combo_run(Crouch_Spam);
// discord.gg/orla
						}
					}
				if(mod_edit[Auto_Strafe] == 1) {
					if(get_ival(Fire)) {
						combo_run(Auto_Strafe);
						}
					}
				if(mod_edit[Ping_On_Fire] == 1) {
					if(get_ival(Fire)){
						combo_run(Ping_On_Fire);
						}
					}
				if(mod_edit[Auto_Reload] == 1) {
					if(event_release(Fire)){
						combo_run(Auto_Reload);
						}
					}
				}
			if(mod_toggle[Custom_Sensitivity]) {
				
			if(!get_ival(ADS) && !get_ival(Fire)) {
				CSens = mod_edit[Custom_Hip_Sens];
			} else if(get_ival(ADS) && !get_ival(Fire)) {
				CSens = mod_edit[Custom_ADS_Sens];
			} else if(!get_ival(ADS) && get_ival(Fire)) {
				CSens = mod_edit[Custom_Fire_Sens];
			} else if(get_ival(ADS) && get_ival(Fire)) {
				CSens = mod_edit[Custom_ADSFire_Sens];
			}
			sensitivity(XB1_RY, NOT_USE, CSens);
			sensitivity(XB1_RX, NOT_USE, CSens);
			}
		break;
		}
// discord.gg/orla
