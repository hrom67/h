                set_val(PRS, 90);
            }
        }
    }
        CurrentX = get_val(PX);
        CurrentY = get_val(PY);
        Polar_Stick = getPolar(PRS, POLAR_RADIUS);
        v2RadiusR = (mod_edit[Sin_Radius] * 32767 / 100);
        if (get_val(Fire) || !get_val(ADS)) {
            if (Polar_Stick >= (32767 / 100)) {
                aiAngle -= 301; 

                if (get_val(Fire) || !get_val(ADS)) {
                    v2Radius = ((v2RadiusR >> 1) * (32767 - isqrt(pow(abs(get_val(PX)), 2) + pow(abs(get_val(PY)), 2))) + (v2RadiusR << 1)) / 32767;
                } else {
                    v2Radius = ((v2RadiusR >> 1 + (set_Radius * 32767 / 1000) >> 1) * (32767 - isqrt(pow(abs(get_val(PX)), 2) + pow(abs(get_val(PY)), 2))) + v2RadiusR) / 32767;
                }
            }
        } else {
            set_val(PX, clamp(CurrentX + cosAngle, -32767, 32767));
            set_val(PY, clamp(CurrentY + sinAngle, -32767, 32767));
        }
        if (get_val(Fire) || !get_val(ADS)) {
            cosAngle = ((cos(aiAngle) * v2Radius) / (32767));
            sinAngle = ((sin(aiAngle) * v2Radius) / (32767));
        } else {
// discord.gg/orla
            cosAngle = ((cos(aiAngle) * v2Radius) / (32767 * mod_edit[Sin_Strength]));
            sinAngle = ((sin(aiAngle) * v2Radius) / (32767 * mod_edit[Sin_Strength]));
        }
        set_val(PX, clamp(CurrentX + cosAngle, -32767, 32767));
        set_val(PY, clamp(CurrentY + sinAngle, -32767, 32767));
    }
